name: Deploy_sample

on:
  
  pull_request:
    branches: [ "main" ]

jobs:
  build:

    runs-on: ubuntu-latest

   

    steps:
    - uses: actions/checkout@v4
    
    - run: docker build -t naga1332/nodesample30 .
    - run: echo "${{secrets.DOCKER_PASS}}" | docker login -u "${{secrets.DOCKER_USER}}" --password-stdin
    - run: docker push naga1332/nodesample30:latest
